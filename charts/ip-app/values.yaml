replicaCount: 1

image:
  repository: your-dockerhub-username/ip-app
  tag: latest

resources:
  limits:
    cpu: "500m"
    memory: "256Mi"
  requests:
    cpu: "200m"
    memory: "128Mi"

livenessProbe:
  path: /health
  initialDelaySeconds: 5

readinessProbe:
  path: /ready
  initialDelaySeconds: 5